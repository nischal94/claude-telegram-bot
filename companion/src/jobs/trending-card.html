<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    width: 800px;
    min-height: 1100px;
    padding: 60px 56px 56px;
  }

  .header {
    margin-bottom: 40px;
  }

  .title-line1 {
    font-size: 42px;
    font-weight: 400;
    color: #1a1a1a;
    line-height: 1.1;
  }

  .title-line2 {
    font-size: 42px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.1;
  }

  .title-period {
    color: #4caf50;
  }

  .meta {
    position: absolute;
    top: 60px;
    right: 56px;
    text-align: right;
  }

  .meta-month {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #888;
    text-transform: uppercase;
  }

  .meta-ranked {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
  }

  .date-range {
    font-size: 16px;
    color: #555;
    margin-top: 8px;
  }

  .divider {
    height: 1px;
    background: #ddd8ce;
    margin-bottom: 8px;
  }

  .row {
    display: flex;
    align-items: flex-start;
    padding: 16px 0;
    border-bottom: 1px solid #e8e3d8;
    gap: 20px;
  }

  .row:last-child {
    border-bottom: none;
  }

  .rank {
    font-size: 15px;
    font-weight: 700;
    color: #4caf50;
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .repo {
    flex: 1;
    min-width: 0;
  }

  .repo-name {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .repo-desc {
    font-size: 13px;
    color: #666;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stars {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    white-space: nowrap;
    flex-shrink: 0;
    padding-top: 3px;
  }
</style>
</head>
<body style="position:relative;">

<div class="meta">
  <div class="meta-month">{{MONTH_YEAR}}</div>
  <div class="meta-ranked">ranked by stars gained</div>
</div>

<div class="header">
  <div class="title-line1">fastest growing</div>
  <div class="title-line2">GitHub repos <span class="title-period">{{PERIOD_LABEL}}</span></div>
  <div class="date-range">{{DATE_RANGE}}</div>
</div>

<div class="divider"></div>

{{ROWS}}

</body>
</html>
